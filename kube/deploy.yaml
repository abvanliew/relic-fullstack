---
apiVersion: v1
kind: Pod
metadata:
  name: relic
spec:
  containers:
  - name: db
    image: relic-data:latest
    ports:
    - containerPort: 27017
    resources:
      limits:
        cpu: 1
        memory: 512Mi
  - name: server
    image: relic-chef:latest
    ports:
    - containerPort: 8080
      hostPort: 8088
    resources:
      limits:
        cpu: 1
        memory: 512Mi
